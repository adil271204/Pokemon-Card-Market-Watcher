services:
  - type: web
    name: pokemon-card-market-web
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python scripts/init_db.py && python scripts/migrate_recent_listing_fields.py && python scripts/migrate_seenlisting_deleted_at.py && python scripts/migrate_listing_location_fields.py && python scripts/migrate_set_scanner.py && python scripts/migrate_cardlist_import_fields.py && python scripts/add_watchlist.py && python scripts/migrate_listing_type_fields.py && python scripts/migrate_listing_status_fields.py && python scripts/migrate_job_runs.py && python scripts/migrate_telegram_alert_fields.py
    startCommand: uvicorn dashboard_app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DASHBOARD_PASSWORD
        value: "changeme123"
      - key: USE_MOCK_EBAY
        value: "false"
      - key: EBAY_ENV
        value: production
      - key: EBAY_MARKETPLACE
        value: EBAY_DE
      - key: EBAY_SEARCH_LIMIT
        value: "50"
      - key: EBAY_LOOKBACK_DAYS
        value: "14"
      - key: EBAY_MAX_PAGES
        value: "5"
      - key: EBAY_CLIENT_ID
        sync: false
      - key: EBAY_CLIENT_SECRET
        sync: false
      - key: LOG_LEVEL
        value: INFO

  - type: cron
    name: pokemon-card-market-cron
    runtime: python
    plan: starter
    schedule: "*/10 * * * *"
    buildCommand: pip install -r requirements.txt && python scripts/init_db.py && python scripts/migrate_recent_listing_fields.py && python scripts/migrate_seenlisting_deleted_at.py && python scripts/migrate_listing_location_fields.py && python scripts/migrate_set_scanner.py && python scripts/migrate_cardlist_import_fields.py && python scripts/add_watchlist.py && python scripts/migrate_listing_type_fields.py && python scripts/migrate_listing_status_fields.py && python scripts/migrate_job_runs.py && python scripts/migrate_telegram_alert_fields.py
    startCommand: python main.py --once
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: USE_MOCK_EBAY
        value: "false"
      - key: EBAY_ENV
        value: production
      - key: EBAY_MARKETPLACE
        value: EBAY_DE
      - key: EBAY_SEARCH_LIMIT
        value: "50"
      - key: EBAY_LOOKBACK_DAYS
        value: "14"
      - key: EBAY_MAX_PAGES
        value: "5"
      - key: EBAY_CLIENT_ID
        sync: false
      - key: EBAY_CLIENT_SECRET
        sync: false
      - key: LOG_LEVEL
        value: INFO
