services:
  - type: cron
    name: pokemon-card-market-cron
    runtime: python
    plan: starter
    schedule: "*/10 * * * *"
    buildCommand: pip install -r requirements.txt && python scripts/init_db.py && python scripts/add_watchlist.py
    startCommand: python main.py --once
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: USE_MOCK_EBAY
        value: "false"
      - key: EBAY_MARKETPLACE
        value: EBAY_DE
      - key: LOG_LEVEL
        value: INFO
