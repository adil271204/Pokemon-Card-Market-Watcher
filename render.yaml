services:
  - type: cron
    name: pokemon-card-watcher
    runtime: python
    schedule: "*/10 * * * *"   # every 10 minutes
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      # Paste your existing Render Postgres external connection string here,
      # or set DATABASE_URL manually in the Render dashboard after deploy.
      - key: DATABASE_URL
        sync: false
      - key: USE_MOCK_EBAY
        value: "false"
      - key: EBAY_MARKETPLACE
        value: EBAY_DE
      # Set these manually in the Render dashboard:
      # EBAY_CLIENT_ID
      # EBAY_CLIENT_SECRET
      # TELEGRAM_BOT_TOKEN
      # TELEGRAM_CHAT_ID
      - key: LOG_LEVEL
        value: INFO
