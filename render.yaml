services:
  # -------------------------------------------------------------------
  # 1. Dashboard – Web Service
  # NOTE: Set DATABASE_URL, DASHBOARD_PASSWORD, SESSION_SECRET manually
  #       in the Render dashboard after deploy.
  # -------------------------------------------------------------------
  - type: web
    name: pokemon-card-market-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn dashboard_app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: USE_MOCK_EBAY
        value: "false"
      - key: EBAY_MARKETPLACE
        value: EBAY_DE
      - key: LOG_LEVEL
        value: INFO

  # -------------------------------------------------------------------
  # 2. Watcher – Cron Job
  # -------------------------------------------------------------------
  - type: cron
    name: pokemon-card-market-cron
    runtime: python
    plan: starter
    schedule: "*/10 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py --once
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: USE_MOCK_EBAY
        value: "false"
      - key: EBAY_MARKETPLACE
        value: EBAY_DE
      - key: LOG_LEVEL
        value: INFO
