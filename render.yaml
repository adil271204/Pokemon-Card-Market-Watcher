databases:
  - name: pokemon-card-market-db
    databaseName: pokemon_watcher
    user: pokemon_watcher

services:
  # -------------------------------------------------------------------
  # 1. Dashboard – Web Service
  # -------------------------------------------------------------------
  - type: web
    name: pokemon-card-market-web
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn dashboard_app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pokemon-card-market-db
          property: connectionString
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: USE_MOCK_EBAY
        value: "false"
      - key: EBAY_MARKETPLACE
        value: EBAY_DE
      - key: LOG_LEVEL
        value: INFO
      # Set manually: EBAY_CLIENT_ID, EBAY_CLIENT_SECRET,
      # TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID

  # -------------------------------------------------------------------
  # 2. Watcher – Cron Job
  # -------------------------------------------------------------------
  - type: cron
    name: pokemon-card-market-cron
    runtime: python
    plan: starter
    schedule: "*/10 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py --once
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pokemon-card-market-db
          property: connectionString
      - key: USE_MOCK_EBAY
        value: "false"
      - key: EBAY_MARKETPLACE
        value: EBAY_DE
      - key: LOG_LEVEL
        value: INFO
      # Set manually: EBAY_CLIENT_ID, EBAY_CLIENT_SECRET,
      # TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
