{% extends "base.html" %}
{% block title %}Login – Card Watcher{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card shadow">
      <div class="card-body p-4">
        <h4 class="card-title mb-4 text-center">
          <i class="bi bi-lock me-2"></i>Dashboard Login
        </h4>
        {% if flash %}
          <div class="alert alert-{{ flash.level }}">{{ flash.message }}</div>
        {% endif %}
        <form method="post" action="/login">
          <div class="mb-3">
            <label class="form-label">Passwort</label>
            <input type="password" name="password" class="form-control" autofocus required>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>Einloggen
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
