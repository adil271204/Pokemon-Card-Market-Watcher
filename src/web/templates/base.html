<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Pokémon Card Watcher{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-currency-exchange me-1"></i>Card Watcher
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarMain">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">
            <i class="bi bi-speedometer2 me-1"></i>Übersicht
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/watchlists' in request.url.path %}active{% endif %}" href="/watchlists">
            <i class="bi bi-list-check me-1"></i>Watchlists
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/listings' %}active{% endif %}" href="/listings">
            <i class="bi bi-card-list me-1"></i>Listings
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/alerts' %}active{% endif %}" href="/alerts">
            <i class="bi bi-bell me-1"></i>Alerts
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/analytics' %}active{% endif %}" href="/analytics">
            <i class="bi bi-bar-chart-line me-1"></i>Analytics
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/settings' %}active{% endif %}" href="/settings">
            <i class="bi bi-gear me-1"></i>Einstellungen
          </a>
        </li>
      </ul>
      {% if auth_enabled %}
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link text-danger" href="/logout">
            <i class="bi bi-box-arrow-right me-1"></i>Logout
          </a>
        </li>
      </ul>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container-fluid py-4 px-4">
  {% if flash %}
    <div class="alert alert-{{ flash.level }} alert-dismissible fade show" role="alert">
      {{ flash.message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endif %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
